<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body { font-family: 'Fira Code', monospace; background: #0d0d0d; color: #00ff41; display: flex; justify-content:center; align-items:center; height:100vh; margin:0;}
form { background:#1a1a1a; padding:30px; border:1px solid #00ff41; border-radius:8px; display:flex; flex-direction:column; width:300px;}
input { margin-bottom:15px; padding:10px; border-radius:4px; border:1px solid #00ff41; background:#0d0d0d; color:#00ff41;}
button { padding:10px; border:none; border-radius:4px; background:#28a745; color:#fff; cursor:pointer;}
h2 { text-align:center; margin-bottom:20px;}
.error-msg { color: #ff4d4d; text-align: center; margin-top: 10px; display: none; }
</style>
</head>
<body>
<form id="adminLoginForm">
  <h2>Login Admin</h2>
  <input type="email" id="user" placeholder="Usuário" required>
  <input type="password" id="pass" placeholder="Senha" required>
  <button type="submit">Entrar</button>
  <p id="error-msg" class="error-msg"></p>
</form>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script>
  const firebaseConfig = {
      apiKey: "AIzaSyAemZwP19k7zaM8QMBPn5kitdlvzY514OI",
      authDomain: "web-xchangeon1.firebaseapp.com",
      databaseURL: "https://web-xchangeon1-default-rtdb.firebaseio.com/",
      projectId: "web-xchangeon1",
      storageBucket: "web-xchangeon1.firebasestorage.app",
      messagingSenderId: "733409941973",
      appId: "1:733409941973:web:6e11c283fcee846b4a855c"
  };
  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const form = document.getElementById('adminLoginForm');
  const errorMsg = document.getElementById('error-msg');
  auth.onAuthStateChanged(user => { if (user) window.location.href = 'painel.html'; });
  form.addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    errorMsg.style.display = 'none';
    auth.signInWithEmailAndPassword(email, pass)
      .catch(error => {
        errorMsg.textContent = 'Usuário ou senha incorretos!';
        errorMsg.style.display = 'block';
      });
  });
</script>
</body>
</html>
